name: Run Unit Tests

on:
  push:
    branches:
      - main

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
      - uses: actions/checkout@v5

      - name: Setup node
      - uses: actions/setup-node@v5
        with:
        node-version: 18
          ache: 'npm'
      
      - name: Rodando testes
      - run: npm ci
      - run: npm run test