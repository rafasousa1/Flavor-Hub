name: Run Unit Tests

on:
  push:
    branches:
      - main

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Setup node
        uses: actions/setup-node@v5
        with:
        node-version: 18
        cache: 'npm'
      
      - name: Instalando dependências
        run: npm ci

      - name: Rodando os testes
        run: npm run test